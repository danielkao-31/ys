name: 300 Users Load Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run controlled 300-user load test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: .github/load-tests/k6-300-users.js

      - name: Upload load-test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-300-users-result
          path: load-test-summary.json
          if-no-files-found: warn
          retention-days: 14
